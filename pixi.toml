[workspace]
name = "imetro_behavior"
authors = ["Sebastian Castro <sebastian.a.castrofernandez@nasa.gov>"]
platforms = ["linux-aarch64", "linux-64"]
version = "0.1.0"
channels = [
  "https://prefix.dev/conda-forge",
  "https://prefix.dev/robostack-jazzy",
]

[tasks]
build = "colcon build"
test = "colcon test"
test-result = "colcon test-result --verbose"
clean = "rm -rf build/* install/* log/*"

[dependencies]
pydot = ">=4.0.1,<5"
pyqtwebengine = ">=5.15.11,<6"

colcon-common-extensions = ">=0.3.0,<0.4"
ros-jazzy-ros-base = "*"
